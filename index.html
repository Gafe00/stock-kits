<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock de Kits - FCAV</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 1.6rem; color: #4834d4; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #764ba2; margin-bottom: 20px; font-weight: 600; }
        
        .kit-box {
            background: #f0f2f5;
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            border: 2px solid #eee;
        }

        .details { font-size: 0.85rem; color: #636e72; margin-bottom: 15px; line-height: 1.4; }

        .stock-tag {
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-whatsapp {
            display: block;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp:hover {
            transform: scale(1.03);
            background: #1eb954;
        }

        .footer-text { font-size: 0.7rem; color: #b2bec3; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <h1> ⋆.𐙚 𝚃𝙷𝙴 𝙲𝙰𝚁𝙳 𝙲𝙰𝚅𝙴 </h1>
        <p class="subtitle">Disponibilidad en Tiempo Real</p>
        
        <div class="kit-box">
            <h3>Kit Armor Sleeve</h3>
            <p class="details">Incluye:<br><b>Sobre de la expansión perfect order + Protector Sleeve + Protector Duro</b></p>
            <!-- CAMBIA EL NÚMERO AQUÍ ABAJO CUANDO VENDAS ALGO -->
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <a class="btn-whatsapp" href="https://wa.me/qr/SOHFNGR6BBYGG1">
            Comprar por WhatsApp
        </a>

        <p class="footer-text">Enviame la orden para proceder con la compra y la entrega:)</p>
    </div>

</body>
</html>
