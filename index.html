<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Card Cave - Stock</title>
    <!-- Importación de fuente para las letras "padres" -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            /* Degradado CSS inspirado en tu imagen */
            background: linear-gradient(90deg, #fc466b 0%, #3f5efb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 5px solid #3f5efb;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 { 
            font-size: 1.8rem; 
            color: #3f5efb; 
            margin-bottom: 5px; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle { 
            font-size: 0.8rem; 
            color: #636e72; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            font-weight: 600; 
        }
        
        .kit-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        h3 { color: #d63031; margin-bottom: 5px; font-weight: 600; }
        .details { font-size: 0.85rem; color: #636e72; margin-bottom: 15px; line-height: 1.4; }

        .stock-tag {
            background: #00b894;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            display: inline-block;
        }

        .cart-section {
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            background: #fff;
            border: 2px dashed #fc466b;
        }

        label { display: block; margin-bottom: 10px; font-weight: 600; color: #3f5efb; }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #3f5efb;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            outline: none;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover { transform: translateY(-3px); }

        .footer-text { font-size: 0.7rem; color: #b2bec3; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Referencia exacta al archivo del logo -->
        <img src="logo.jpg" alt="The Card Cave Logo" class="logo">
        
        <h1>𝚃𝙷𝙴 𝙲𝙰𝚁𝙳 𝙲𝙰𝚅𝙴</h1>
        <p class="subtitle">Disponibilidad FCAV</p>
        
        <div class="kit-box">
            <h3>Kit Armor Sleeve</h3>
            <p class="details">Sobre Perfect Order + Protector Sleeve + Protector Duro</p>
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <div class="cart-section">
            <label>Cantidad de Kits:</label>
            <input type="number" id="cantidad" value="1" min="1" max="35">
        </div>

        <a class="btn-whatsapp" href="#" onclick="enviarPedido()">
            🛒 Enviar Pedido a WhatsApp
        </a>

        <p class="footer-text">Ordena para proceder con la entrega :)</p>
    </div>

    <script>
        function enviarPedido() {
            const cantidad = document.getElementById('cantidad').value;
            // Asegúrate de poner tu número real aquí abajo
            const miTelefono = "8341111555"; 
            const mensaje = encodeURIComponent(`¡Hola! Vengo de tu sistema. Quisiera comprar ${cantidad} Kit(s) Armor Sleeve en The Card Cave.`);
            
            window.location.href = `https://wa.me/${miTelefono}?text=${mensaje}`;
        }
    </script>
</body>
</html>
