<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Card Cave - Master Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Passion+One:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(90deg, #fc466b 0%, #3f5efb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor con efecto Carta Holográfica */
        .container {
            background: linear-gradient(135deg, #ffffff 0%, #f1f1f1 50%, #ffffff 100%);
            position: relative;
            overflow: hidden;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 10px solid #FFCC00; /* Borde amarillo clásico de carta */
        }

        .logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 4px solid #FFCB00; 
            box-shadow: 0 0 15px rgba(255, 203, 5, 0.6);
            position: relative;
            z-index: 2;
        }

        /* Estilo Letras Pokémon */
        h1 { 
            font-family: 'Passion One', cursive;
            font-size: 2.5rem; 
            color: #FFC900; 
            text-shadow: 
                -3px -3px 0 #1728B3, 
                 3px -3px 0 #0015AD, 
                -3px  3px 0 #000BA6, 
                 3px  3px 0 #0017BD,
                 4px  4px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .subtitle { font-size: 0.8rem; color: #0019D9; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; }
        
        /* Recuadro de Kit Estilo Pokémon Card */
        .kit-box {
            background: linear-gradient(180deg, #2332B0 0%, #081C9C 100%);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #FFC600;
            color: white;
            box-shadow: inset 0 0 10px rgba(255, 255, 0);
        }

        .kit-box h3 { color: #FFF200; margin-bottom: 5px; font-size: 1.4rem; }
        .details { font-size: 0.85rem; color: #CFF0FF; margin-bottom: 15px; font-weight: 400; }

        .stock-tag {
            background: #FFC814;
            color: #0217A3;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            display: inline-block;
            border: 2px solid #000C9E;
        }

        /* Apartado Cantidad Estilo Battle UI */
        .cart-section {
            margin: 20px 0;
            padding: 15px;
            background: #FFE8F5;
            border-radius: 12px;
            border-bottom: 4px solid #FFE8F5;
        }

        label { display: block; margin-bottom: 10px; font-weight: 800; color: #4F002E; font-size: 0.9rem; }

        input[type="number"] {
            width: 90px;
            padding: 10px;
            border-radius: 8px;
            border: 3px solid #3b4cca;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #3b4cca;
            background: white;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
            box-shadow: 0 6px 0 #27ae60;
            cursor: pointer;
        }

        .btn-whatsapp:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }

        .footer-text { font-size: 0.75rem; color: #7f8c8d; margin-top: 25px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="Logo" class="logo">
        
        <h1>THE CARD CAVE</h1>
        <p class="subtitle">¡Arma y cuida tus HITS aquí!</p>
        
        <div class="kit-box">
            <h3>KIT ARMOR SLEEVE</h3>
            <p class="details">Sobre Perfect Order + Sleeve + Toploader</p>
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <div class="cart-section">
            <label>SELECCIONA CANTIDAD:</label>
            <input type="number" id="cantidad" value="1" min="1" max="35">
        </div>

        <div class="btn-whatsapp" onclick="enviarPedido()">
            🛒 ¡PEDIR AHORA!
        </div>

        <p class="footer-text">Entregas en FCAV - Ciudad Victoria & externas en punto medio</p>
    </div>
<script>
    function enviarPedido() {
        const cantidad = document.getElementById('cantidad').value;
        const miTelefono = "528341111555"; 
        // Aquí corregí el cierre de la comilla y el paréntesis:
        const mensaje = encodeURIComponent(`¡Hola! Quisiera ordenar ${cantidad} Kit de Armor Sleeve en The Card Cave. De la colección de perfect order!!`);
        
        window.location.href = `https://wa.me/${miTelefono}?text=${mensaje}`;
    }
</script>
</body>
</html>
