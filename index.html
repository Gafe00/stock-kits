<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Card Cave - Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            /* Color de fondo solicitado */
            background-color: #3F5EFB; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #2d3436;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 4px solid #3F5EFB;
        }

        h1 { font-size: 1.8rem; color: #3F5EFB; margin-bottom: 5px; font-weight: 800; }
        .subtitle { font-size: 0.8rem; color: #636e72; margin-bottom: 20px; text-transform: uppercase; font-weight: 600; }
        
        .kit-box {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        h3 { color: #d63031; margin-bottom: 5px; }
        .details { font-size: 0.85rem; color: #636e72; margin-bottom: 15px; }

        .stock-tag {
            background: #00b894;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            display: inline-block;
        }

        .cart-section {
            margin: 20px 0;
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #3F5EFB;
        }

        label { display: block; margin-bottom: 10px; font-weight: 600; color: #3F5EFB; }

        input[type="number"] {
            width: 70px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #3F5EFB;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-whatsapp:hover { transform: scale(1.03); }

        .footer-text { font-size: 0.7rem; color: #b2bec3; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Asegúrate de que el nombre del archivo coincida con el que subiste a GitHub -->
        <img src="image_bfafd5.jpg" alt="The Card Cave Logo" class="logo">
        
        <h1>𝚃𝙷𝙴 𝙲𝙰𝚁𝙳 𝙲𝙰𝚅𝙴</h1>
        <p class="subtitle">Disponibilidad FCAV</p>
        
        <div class="kit-box">
            <h3>Kit Armor Sleeve</h3>
            <p class="details">Sobre Perfect Order + Sleeve + Protector Duro</p>
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <div class="cart-section">
            <label>¿Cuántos kits quieres agregar?</label>
            <input type="number" id="cantidad" value="1" min="1" max="35">
        </div>

        <a class="btn-whatsapp" href="#" onclick="enviarPedido()">
            🛒 Enviar Pedido por WhatsApp
        </a>

        <p class="footer-text">Enviame la orden para proceder con la entrega :)</p>
    </div>

    <script>
        function enviarPedido() {
            const cantidad = document.getElementById('cantidad').value;
            // Escribe tu número aquí: 52 + lada + número (ejemplo: 528341234567)
            const miTelefono = "521234567890"; 
            const mensaje = encodeURIComponent(`¡Hola! Vengo de tu página. Quisiera ordenar ${cantidad} Kit(s) Armor Sleeve de The Card Cave. ¿Me confirmas disponibilidad?`);
            
            window.location.href = `https://wa.me/${miTelefono}?text=${mensaje}`;
        }
    </script>
</body>
</html>
