<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Card Cave - Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(90deg, #fc466b 0%, #3f5efb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 4px solid #4834d4; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.6rem; color: #4834d4; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #764ba2; margin-bottom: 20px; font-weight: 600; }
        
        /* Recuadro del Kit con color llamativo */
        .kit-box {
            background: #fef1f8; /* Un tono rosado suave muy bonito */
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            border: 2px solid #fc466b;
        }

        h3 { color: #d63031; margin-bottom: 5px; }
        .details { font-size: 0.85rem; color: #636e72; margin-bottom: 15px; line-height: 1.4; }

        .stock-tag {
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .cart-section {
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border: 1px dashed #4834d4;
        }

        label { display: block; margin-bottom: 12px; font-weight: 600; color: #4834d4; }

        /* Incrementador más visible y grande */
        input[type="number"] {
            width: 100px;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid #3f5efb;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #3f5efb;
            outline: none;
            background-color: #f0f4ff;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);
            cursor: pointer;
        }

        .btn-whatsapp:hover { transform: scale(1.03); }

        .footer-text { font-size: 0.7rem; color: #b2bec3; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="The Card Cave Logo" class="logo">
        
        <h1>𝚃𝙷𝙴 𝙲𝙰𝚁𝙳 𝙲𝙰𝚅𝙴</h1>
        <p class="subtitle">Disponibilidad en Tiempo Real</p>
        
        <div class="kit-box">
            <h3>Kit Armor Sleeve</h3>
            <p class="details">Sobre Perfect Order + Protector Sleeve + Protector Duro</p>
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <div class="cart-section">
            <label>CANTIDAD DE KITS:</label>
            <input type="number" id="cantidad" value="1" min="1" max="35">
        </div>

        <div class="btn-whatsapp" onclick="enviarPedido()">
            🛒 Comprar por WhatsApp
        </div>

        <p class="footer-text">Enviame la orden para proceder con la entrega :)</p>
    </div>

   <script>
        function enviarPedido() {
            const cantidad = document.getElementById('cantidad').value;
            // Usando tu nuevo número directo para que funcione perfecto
            const miTelefono = "528341111555"; 
            const mensaje = encodeURIComponent(`¡Hola! Vengo de tu sistema. Quisiera ordenar ${cantidad} Kit(s) Armor Sleeve de The Card Cave.`);
            
            window.location.href = `https://wa.me/${miTelefono}?text=${mensaje}`;
        }
    </script>
</body>
</html>
