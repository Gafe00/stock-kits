<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Card Cave - Master Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Passion+One:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(90deg, #fc466b 0%, #3f5efb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor con efecto Carta Holográfica */
        .container {
            background: linear-gradient(135deg, #ffffff 0%, #f1f1f1 50%, #ffffff 100%);
            position: relative;
            overflow: hidden;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 10px solid #f1c40f; /* Borde amarillo clásico de carta */
        }

        /* Brillo Holográfico */
        .container::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.7) 30%, transparent 40%, rgba(100,200,255,0.2) 50%, transparent 60%);
            animation: holo 6s linear infinite;
            pointer-events: none;
        }

        @keyframes holo {
            from { transform: translateX(-20%) translateY(-20%); }
            to { transform: translateX(20%) translateY(20%); }
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 4px solid #ffcb05; 
            box-shadow: 0 0 15px rgba(255, 203, 5, 0.6);
            position: relative;
            z-index: 2;
        }

        /* Estilo Letras Pokémon */
        h1 { 
            font-family: 'Passion One', cursive;
            font-size: 2.5rem; 
            color: #ffcb05; 
            text-shadow: 
                -3px -3px 0 #3b4cca, 
                 3px -3px 0 #3b4cca, 
                -3px  3px 0 #3b4cca, 
                 3px  3px 0 #3b4cca,
                 4px  4px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .subtitle { font-size: 0.8rem; color: #3b4cca; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; }
        
        /* Recuadro de Kit Estilo Pokémon Card */
        .kit-box {
            background: linear-gradient(180deg, #3b4cca 0%, #2a3a99 100%);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #ffcb05;
            color: white;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
        }

        .kit-box h3 { color: #ffcb05; margin-bottom: 5px; font-size: 1.4rem; }
        .details { font-size: 0.85rem; color: #ecf0f1; margin-bottom: 15px; font-weight: 400; }

        .stock-tag {
            background: #ffcb05;
            color: #3b4cca;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            display: inline-block;
            border: 2px solid #3b4cca;
        }

        /* Apartado Cantidad Estilo Battle UI */
        .cart-section {
            margin: 20px 0;
            padding: 15px;
            background: #e0e0e0;
            border-radius: 12px;
            border-bottom: 4px solid #bdc3c7;
        }

        label { display: block; margin-bottom: 10px; font-weight: 800; color: #2d3436; font-size: 0.9rem; }

        input[type="number"] {
            width: 90px;
            padding: 10px;
            border-radius: 8px;
            border: 3px solid #3b4cca;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #3b4cca;
            background: white;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
            box-shadow: 0 6px 0 #27ae60;
            cursor: pointer;
        }

        .btn-whatsapp:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }

        .footer-text { font-size: 0.75rem; color: #7f8c8d; margin-top: 25px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <img src="image_bfafd5.jpg" alt="Logo" class="logo">
        
        <h1>THE CARD CAVE</h1>
        <p class="subtitle">¡Hazte con todos los kits!</p>
        
        <div class="kit-box">
            <h3>KIT ARMOR SLEEVE</h3>
            <p class="details">Perfect Order + Sleeve + Toploader</p>
            <div class="stock-tag">35 DISPONIBLES</div>
        </div>

        <div class="cart-section">
            <label>SELECCIONA CANTIDAD:</label>
            <input type="number" id="cantidad" value="1" min="1" max="35">
        </div>

        <div class="btn-whatsapp" onclick="enviarPedido()">
            🛒 ¡PEDIR AHORA!
        </div>

        <p class="footer-text">Entregas en FCAV - Ciudad Victoria</p>
    </div>

    <script>
        function enviarPedido() {
            const cantidad = document.getElementById('cantidad').value;
            const miTelefono = "528341111555"; 
            const mensaje = encodeURIComponent(`¡Hola! Quisiera ordenar ${cantidad} Kit(s) Armor Sleeve en The Card Cave. ¡Yo te elijo!`);
            window.location.href = `https://wa.me/${miTelefono}?text=${mensaje}`;
        }
    </script>
</body>
</html>
